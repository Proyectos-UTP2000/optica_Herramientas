spring:
  datasource:
    url: jdbc:h2:mem:optica_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: false

  mail:
    username: test@example.com
    password: test-password

api:
  peru:
    url-dni: https://example.test/dni/
    url-ruc: https://example.test/ruc/
    token: test-token

jwt:
  secret: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
  expiration: 86400000

cloudinary:
  cloud-name: test-cloud
  api-key: test-key
  api-secret: test-secret
