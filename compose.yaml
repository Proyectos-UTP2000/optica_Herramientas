services:
  mysql:
    image: "mysql:8.0"
    container_name: optica_db
    restart: always
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - TZ=America/Lima
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: optica_backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      SERVER_PORT: 8080
      FRONTEND_URL: ${FRONTEND_URL}
      CATALOGO_URL: ${CATALOGO_URL}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      API_PERU_URL_DNI: ${API_PERU_URL_DNI}
      API_PERU_URL_RUC: ${API_PERU_URL_RUC}
      API_PERU_TOKEN: ${API_PERU_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    ports:
      - "127.0.0.1:8080:8080"

  admin:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        CATALOGO_URL: ${CATALOGO_URL}
    container_name: optica_admin
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:80"

  catalogo:
    build:
      context: ./catalogo-b2c
      dockerfile: Dockerfile
    container_name: optica_catalogo
    restart: always
    depends_on:
      - backend
    ports:
      - "5174:80"

volumes:
  mysql_data:
